<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood donation</title>
</head>

<body>

  

  <form  method="post">


      <table>
        <div><h1>Donor Information</h1></div>
        <tr>
          <td><label for="First Name">First Name <span>*</span> </label></td>
          <td><input type="text" id="firstName" name="firstName" required></td>
        </tr>
        <tr>
          <td><label for="Last Name">Last Name <span>*</span> </label></td>
          <td><input type="text" id="lastName" name="lastName" required></td>
        </tr>
        <tr>
          <td><label for="Company">Company  </label></td>
          <td><input type="text" id="Company" name="Company" ></td>
        </tr>
        <tr>
          <td><label for="Address1">Address1 <span>*</span>  </label></td>
          <td><input type="text" id="Address1" name="Address1" required > </td>
        </tr>
        <tr>
          <td><label for="Address2">Address2 <span>*</span>  </label></td>
          <td><input type="text" id="Address2" name="Address2" required > </td>
        </tr>
        <tr>
          <td><label for="City">City <span>*</span>  </label></td>
          <td><input type="text" id="City" name="City" required > </td>
        </tr>
        <tr>
          <td><label for="State">State<span>*</span></label><br></td>
          <td><select id="State" name="State">
              <option value="">-- Select a state --</option>
              <option value="Bogura">Job</option>
              <option value="Meherpur">Meherpur</option>
              <option value="Sirajgang">Sirajgang</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="Zip code">Zip code <span>*</span>  </label></td>
          <td><input type="text" pattern="[0-9]" id="Zip code" name="Zip code" required > </td>
        </tr>
        <tr>
          <td><label for="Country">Country<span>*</span></label><br></td>
          <td><select id="Country" name="Country">
              <option value="">-- Select a Country --</option>
              <option value="Bangladesh">Bangladesh</option>
              <option value="USA">USA</option>
              <option value="UK">UK</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="Phone">Phone <span>*</span>  </label></td>
          <td><input type="number" id="Phone" name="Phone" > </td>
        </tr>
        <tr>
          <td><label for="Fax" >Fax <span>*</span>  </label></td>
          <td><input type="tel" pattern="[a-z]+[0-9]" id="Fax" name="Fax" > </td>
        </tr>
        <tr>
          <td><label for="Email">Email <span>*</span>  </label></td>
          <td><input type="Email" id="Email" name="Email" required > </td>
        </tr>
        <tr>
          <td><label>Donation of Amount<span>*</span> <br> (Check a button or type in your <br>amount)</label></td>
          <td>
            <label><input type="radio" name="None" value="None">None </label>
            <label><input type="radio" name="$50" value="$50"> $50</label>
            <label><input type="radio" name="$75" value="$75"> $75</label>
            <label><input type="radio" name="$100" value="$100"> $100</label>
            <label><input type="radio" name="$100" value="$250"> $250</label>
            <label><input type="radio" name="others" value="others"> others</label>
          </td>
        </tr>
        <tr>
          <td><label for="fff">   </label></td>
          <td><label for="Others Amount">Others Amount $   </label></td>
          <td><input type="number" id="Others Amount" name="Others Amount" > </td>
        </tr>

        <tr>
          <td><label>Recurring Donation <br> (Chek if yes)</label></td>
          <td>
            <label><input type="checkbox" name="Recurring Donation" value="Recurring Donation">i am interested in giving on a regular basis. </label>
          </td>
        </tr>
        <tr>
          <td></td>
          <td>
            <label for="Monthly credit card $">Monthly credit card  </label>
            <input type="number" id="Monthly credit card" name="Monthly credit card" >
            <label for="For">For </label>
            <input type="number" id="For" name="For" >
            <Months for="Months">Months </Months>
          </td>
            
          
        </tr>
      </table>
      
      <table>
        <div><h1>Honorarium and Momorial Donation Information</h1></div>

     
        <tr>
          <td><label>I would like to make this <br>donation</label></td>
          <td>
            <label><input type="radio" name="To honor" value="to honor"> To honor</label>
        </tr>
        <tr>
          <td><label></label></td>
          <td>
            <label><input type="radio" name="In a memory of" value="In a memory of"> In a memory of</label>
        </tr>



      <tr>
          <td><label for="Name">Name  </label></td>
          <td><input type="text" id="Name" name="Name" ></td>
        </tr>
        <tr>
          <td><label for="Aknowledge to donation">Aknowledge to donation  </label></td>
          <td><input type="text" id="Aknowledge to donation" name="Aknowledge to donation" ></td>
        </tr>
        <tr>
          <td><label for="Address">Address  </label></td>
          <td><input type="text" id="Address" name="Address" ></td>
        </tr>
        <tr>
          <td><label for="City">City  </label></td>
          <td><input type="text" id="City" name="City"  > </td>
        </tr>
        <tr>
          <td><label for="State">State</label><br></td>
          <td><select id="State" name="State">
              <option value="">-- Select a state --</option>
              <option value="Bogura">Job</option>
              <option value="Meherpur">Meherpur</option>
              <option value="Sirajgang">Sirajgang</option>
            </select></td>
        </tr>
        <tr>
          <td><label for="Zip">Zip   </label></td>
          <td><input type="text" id="Zip" name="Zip" > </td>
        </tr> 

      
        
        
      </table>
    
  </form>


  

</body>

</html>
